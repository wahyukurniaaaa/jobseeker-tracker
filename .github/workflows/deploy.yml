name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Dashboard (SvelteKit)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-dashboard:${{ github.sha }}

      - name: Build and Push Scraper (Python)
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          file: ./scraper/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-scraper:latest
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-scraper:${{ github.sha }}

      - name: Trigger Redeploy on Easypanel
        run: |
          echo "Triggering redeploy for Dashboard..."
          curl -s -X POST "${{ secrets.EASYPANEL_URL }}/api/trpc/services.app.deployService" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"json": {"projectName": "laboratory-staging", "serviceName": "jobseeker-dashboard"}}'
          
          echo "Triggering redeploy for Scraper..."
          curl -s -X POST "${{ secrets.EASYPANEL_URL }}/api/trpc/services.app.deployService" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"json": {"projectName": "laboratory-staging", "serviceName": "jobseeker-scraper"}}'

