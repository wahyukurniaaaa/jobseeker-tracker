name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Dashboard (SvelteKit)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-dashboard:${{ github.sha }}

      - name: Build and Push Scraper (Python)
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          file: ./scraper/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-scraper:latest
            ghcr.io/${{ github.repository_owner }}/jobseeker-tracker-scraper:${{ github.sha }}
